<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota2 比赛预测</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <!-- 登录页面 -->
        <div id="login-page" class="page">
            <div class="login-bg"></div>
            <div class="login-container">
                <div class="login-logo">
                    <i class="fas fa-gamepad"></i>
                </div>
                <h1 class="gradient-text">Dota2 比赛预测</h1>
                <p class="login-subtitle">电竞预测平台</p>
                <div class="login-form">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="login-username" placeholder="用户名" list="user-list">
                    </div>
                    <datalist id="user-list"></datalist>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="密码" value="123456">
                    </div>
                    <button class="btn-primary" onclick="login()">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                    <p class="hint"><i class="fas fa-info-circle"></i> 初始密码: 123456</p>
                </div>
            </div>
        </div>

        <!-- 主页面 -->
        <div id="main-page" class="page hidden">
            <!-- 导航栏 -->
            <header class="navbar">
                <div class="nav-left">
                    <div class="logo">
                        <i class="fas fa-gamepad"></i>
                        <span class="gradient-text">Dota2预测</span>
                    </div>
                    <div class="nav-divider"></div>
                    <nav class="nav-tabs">
                        <button class="nav-tab active" onclick="switchTab('market')">
                            <i class="fas fa-chart-line"></i> 市场
                        </button>
                        <button class="nav-tab" onclick="switchTab('my-bets')">
                            <i class="fas fa-ticket-alt"></i> 我的预测
                        </button>
                    </nav>
                </div>
                <div class="nav-right">
                    <div class="user-card">
                        <div class="user-avatar">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <div class="user-info">
                            <span id="user-name" class="user-name"></span>
                            <span id="user-balance" class="user-balance">
                                <i class="fas fa-coins"></i> ¥0
                            </span>
                        </div>
                    </div>
                    <div class="nav-actions">
                        <button class="btn-icon" onclick="showChangePassword()" title="修改密码">
                            <i class="fas fa-cog"></i>
                        </button>
                        <button class="btn-icon btn-danger" onclick="logout()" title="退出">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- 市场页面 -->
            <div id="market-tab" class="tab-content">
                <div class="page-header">
                    <div class="page-title">
                        <i class="fas fa-trophy"></i>
                        <h2>比赛市场</h2>
                    </div>
                    <button class="btn-gradient" onclick="showCreateMatch()">
                        <i class="fas fa-plus"></i> 创建比赛
                    </button>
                </div>
                
                <!-- 筛选栏 -->
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">
                        <i class="fas fa-th-large"></i> 全部
                    </button>
                    <button class="filter-btn" data-filter="open">
                        <i class="fas fa-play-circle"></i> 进行中
                    </button>
                    <button class="filter-btn" data-filter="closed">
                        <i class="fas fa-lock"></i> 已封盘
                    </button>
                    <button class="filter-btn" data-filter="settled">
                        <i class="fas fa-check-circle"></i> 已结算
                    </button>
                </div>

                <div id="matches-list" class="matches-grid">
                    <!-- 比赛列表将在这里动态生成 -->
                </div>
            </div>

            <!-- 我的预测页面 -->
            <div id="my-bets-tab" class="tab-content hidden">
                <div class="page-header">
                    <div class="page-title">
                        <i class="fas fa-history"></i>
                        <h2>我的预测</h2>
                    </div>
                </div>
                <div id="my-bets-list" class="bets-grid">
                    <!-- 我的下注列表将在这里动态生成 -->
                </div>
            </div>
        </div>

        <!-- 创建比赛弹窗 -->
        <div id="create-match-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-plus-circle"></i> 创建比赛</h3>
                    <button class="modal-close" onclick="closeModal('create-match-modal')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-shield-alt"></i> 队伍A</label>
                            <input type="text" id="match-team-a" placeholder="输入队伍A名称">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-shield-alt"></i> 队伍B</label>
                            <input type="text" id="match-team-b" placeholder="输入队伍B名称">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> 预测类型</label>
                            <select id="match-type">
                                <option value="winner">比赛胜负</option>
                                <option value="first_blood">一血</option>
                                <option value="ten_kills">10杀</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-hand-pointer"></i> 您支持的队伍</label>
                            <select id="creator-choice">
                                <option value="">请先输入队伍名称</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-percentage"></i> 对方赔率</label>
                            <input type="number" id="match-odds" placeholder="例如: 1.8" step="0.01" min="1.01">
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-coins"></i> 最大总下注金额</label>
                            <input type="number" id="max-bet" placeholder="例如: 500" min="1">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('create-match-modal')">取消</button>
                    <button class="btn-primary" onclick="createMatch()">
                        <i class="fas fa-check"></i> 创建
                    </button>
                </div>
            </div>
        </div>

        <!-- 下注弹窗 -->
        <div id="place-bet-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-coins"></i> 下注</h3>
                    <button class="modal-close" onclick="closeModal('place-bet-modal')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="bet-match-info" class="bet-info-card"></div>
                    <div class="form-group">
                        <label><i class="fas fa-flag"></i> 选择队伍</label>
                        <select id="bet-team"></select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-coins"></i> 下注金额</label>
                        <input type="number" id="bet-amount" placeholder="输入金额" min="1">
                    </div>
                    <div class="estimated-profit">
                        <span>预计收益:</span>
                        <span id="estimated-profit" class="profit-value">¥0</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('place-bet-modal')">取消</button>
                    <button class="btn-gradient" onclick="placeBet()">
                        <i class="fas fa-check"></i> 确认下注
                    </button>
                </div>
            </div>
        </div>

        <!-- 结算弹窗 -->
        <div id="settle-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-trophy"></i> 结算比赛</h3>
                    <button class="modal-close" onclick="closeModal('settle-modal')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <p class="settle-hint">请选择获胜队伍:</p>
                    <div id="settle-teams" class="settle-teams"></div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('settle-modal')">取消</button>
                </div>
            </div>
        </div>

        <!-- 修改密码弹窗 -->
        <div id="change-password-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h3><i class="fas fa-key"></i> 修改密码</h3>
                    <button class="modal-close" onclick="closeModal('change-password-modal')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 原密码</label>
                        <input type="password" id="old-password">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-lock"></i> 新密码</label>
                        <input type="password" id="new-password">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" onclick="closeModal('change-password-modal')">取消</button>
                    <button class="btn-primary" onclick="changePassword()">
                        <i class="fas fa-check"></i> 确认修改
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
